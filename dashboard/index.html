<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CycleSentinel — Live Hazard Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 1.2rem; font-weight: 700; }
    .logo span { color: #58a6ff; }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: #1f2937; border: 1px solid #374151;
      border-radius: 20px; padding: 4px 12px;
      font-size: 0.75rem; font-weight: 600; color: #10b981;
    }
    .live-dot {
      width: 8px; height: 8px; background: #10b981;
      border-radius: 50%; animation: pulse-green 1.5s infinite;
    }
    @keyframes pulse-green {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.8); }
    }


    /* ── Main layout ── */
    .main { display: flex; flex: 1; overflow: hidden; }
    #map  { flex: 1; z-index: 1; position: relative; }

    /* ── Sidebar ── */
    .sidebar {
      width: 320px; background: #161b22;
      border-left: 1px solid #30363d;
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    .sidebar-header {
      padding: 14px 16px; border-bottom: 1px solid #30363d;
      font-size: 0.8rem; font-weight: 600; color: #8b949e;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .alert-list { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:8px; }
    .alert-list::-webkit-scrollbar { width:4px; }
    .alert-list::-webkit-scrollbar-thumb { background:#30363d; border-radius:2px; }

    .alert-card {
      background:#0d1117; border:1px solid #30363d; border-radius:8px;
      padding:12px; cursor:pointer; transition:border-color 0.2s;
      animation:slide-in 0.3s ease;
    }
    @keyframes slide-in { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .alert-card:hover   { border-color:#58a6ff; }
    .alert-card.RED     { border-left:3px solid #ef4444; }
    .alert-card.ORANGE  { border-left:3px solid #f97316; }
    .alert-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .severity-badge { font-size:0.68rem; font-weight:700; padding:2px 8px; border-radius:4px; }
    .severity-badge.RED    { background:rgba(239,68,68,0.2);  color:#ef4444; }
    .severity-badge.ORANGE { background:rgba(249,115,22,0.2); color:#f97316; }
    .alert-time   { font-size:0.68rem; color:#8b949e; }
    .alert-rms    { font-size:0.75rem; color:#8b949e; margin-bottom:6px; }
    .alert-rms strong { color:#e6edf3; }
    .alert-summary { font-size:0.75rem; color:#c9d1d9; line-height:1.45; }
    .empty-state {
      flex:1; display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:8px; color:#484f58; font-size:0.85rem;
      text-align:center; padding:20px;
    }
    .empty-icon { font-size:2.5rem; }

    /* ── Markers ── */
    .marker-red {
      width:18px; height:18px; background:#ef4444;
      border:2px solid #fff; border-radius:50%;
      animation:pulse-red 1.8s infinite;
    }
    @keyframes pulse-red {
      0%  { box-shadow:0 0 0 0 rgba(239,68,68,0.7); }
      70% { box-shadow:0 0 0 12px rgba(239,68,68,0); }
      100%{ box-shadow:0 0 0 0 rgba(239,68,68,0); }
    }
    .marker-orange {
      width:16px; height:16px; background:#f97316;
      border:2px solid #fff; border-radius:50%;
      box-shadow:0 0 6px rgba(249,115,22,0.6);
    }

    /* ── Reset button ── */
    .reset-btn {
      margin:8px; padding:8px;
      background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
      border-radius:6px; color:#ef4444; font-size:0.75rem; font-weight:600;
      cursor:pointer; transition:background 0.2s;
    }
    .reset-btn:hover { background:rgba(239,68,68,0.2); }

    /* ── Route panel ── */
    .route-panel {
      position: absolute; bottom: 24px; left: 12px; z-index: 1000;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 10px; width: 270px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    .route-panel-header {
      padding: 10px 14px; font-size: 0.8rem; font-weight: 700;
      color: #58a6ff; border-bottom: 1px solid #30363d;
    }
    .route-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

    .route-field label {
      display: block; font-size: 0.68rem; color: #8b949e;
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px;
    }
    .route-input-row { display: flex; gap: 4px; }
    .route-input-row input {
      flex: 1; background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; padding: 7px 10px; color: #e6edf3;
      font-size: 0.78rem; outline: none; transition: border-color 0.2s;
    }
    .route-input-row input:focus   { border-color: #58a6ff; }
    .route-input-row input.picking { border-color: #f97316; }
    .route-input-row input::placeholder { color: #484f58; }

    .pick-btn {
      background: #21262d; border: 1px solid #30363d; border-radius: 6px;
      padding: 6px 9px; color: #8b949e; cursor: pointer; font-size: 0.85rem;
      transition: all 0.2s; flex-shrink: 0;
    }
    .pick-btn:hover  { border-color: #58a6ff; color: #58a6ff; }
    .pick-btn.active { border-color: #f97316; color: #f97316; background: rgba(249,115,22,0.1); }

    .route-go {
      padding: 9px; background: #1f6feb; border: none; border-radius: 6px;
      color: #fff; font-size: 0.82rem; font-weight: 700; cursor: pointer;
      transition: background 0.2s; width: 100%; margin-top: 2px;
    }
    .route-go:hover    { background: #388bfd; }
    .route-go:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    .route-result {
      padding: 8px 12px; border-top: 1px solid #30363d;
      font-size: 0.73rem; line-height: 1.6; display: none;
    }
    .route-result .good  { color: #22c55e; font-weight: 700; }
    .route-result .warn  { color: #f97316; }
    .route-result .muted { color: #8b949e; }

    .route-legend {
      display: flex; gap: 14px; padding: 7px 12px;
      border-top: 1px solid #30363d; font-size: 0.68rem; color: #8b949e;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-line { width: 20px; height: 3px; border-radius: 2px; }

    .pick-hint {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(22,27,34,0.92); border: 1px solid #f97316;
      border-radius: 8px; padding: 10px 18px; font-size: 0.82rem;
      color: #f97316; pointer-events: none; z-index: 2000;
      display: none; white-space: nowrap;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🚲 <span>Cycle</span>Sentinel
    <span style="color:#8b949e;font-weight:400;font-size:0.9rem;">— UC Davis Campus</span>
  </div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</header>


<div class="main">
  <div id="map">
    <div class="pick-hint" id="pick-hint">🎯 Click the map to set location</div>
    <div style="position:absolute;top:12px;right:12px;z-index:1000;
                background:rgba(22,27,34,0.82);border:1px solid #30363d;
                border-radius:8px;padding:6px 12px;font-size:0.75rem;color:#8b949e;">
      Updated <span id="last-update" style="color:#58a6ff;font-weight:600;">--:--:--</span>
    </div>

    <div class="route-panel">
      <div class="route-panel-header">🗺 Safe Route Planner</div>
      <div class="route-body">

        <div class="route-field">
          <label>📍 Start</label>
          <div class="route-input-row">
            <input type="text" id="input-start" placeholder="e.g. Memorial Union" />
            <button class="pick-btn" id="pick-start" onclick="startPicking('start')" title="Click map">🎯</button>
          </div>
        </div>

        <div class="route-field">
          <label>🏁 End</label>
          <div class="route-input-row">
            <input type="text" id="input-end" placeholder="e.g. Bike Barn" />
            <button class="pick-btn" id="pick-end" onclick="startPicking('end')" title="Click map">🎯</button>
          </div>
        </div>

        <button class="route-go" id="btn-go" onclick="findRoute()">Find Safe Route 🚲</button>
      </div>
      <div class="route-result" id="route-result"></div>
      <div class="route-legend">
        <div class="legend-item">
          <div class="legend-line" style="background:transparent;border-bottom:2px dashed #6b7280"></div>
          Direct
        </div>
        <div class="legend-item">
          <div class="legend-line" style="background:#22c55e"></div>
          Safe
        </div>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">Hazard Alerts</div>
    <div class="alert-list" id="alert-list">
      <div class="empty-state">
        <div class="empty-icon">🛡️</div>
        <div>No hazards detected yet.<br/>Start riding to populate the map.</div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetMap()">⚠ Clear All Hazards</button>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';

  // ── Map ────────────────────────────────────────────────────────────────
  const map = L.map('map').setView([38.5382, -121.7497], 16);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 20,
  }).addTo(map);

  // ── Hazard state ───────────────────────────────────────────────────────
  const knownSpots    = new Set();
  const markers       = {};
  const alertCards    = {};   // spot_id → sidebar card DOM element
  const spotSummaries = {};   // spot_id → last known summary
  let   totalScanned  = 0;

  function makeHazardLayer(severity, lat, lon) {
    const color = severity === 'RED'     ? '#ef4444'
                : severity === 'ORANGE'  ? '#f97316'
                : '#6b7280';  // PENDING = gray

    return L.circle([lat, lon], {
      radius:      severity === 'RED' ? 18 : 13,
      color,
      weight:      1.5,
      opacity:     0.7,
      fillColor:   color,
      fillOpacity: severity === 'RED' ? 0.22 : 0.16,
    });
  }

  function addAlertCard(spot) {
    const list = document.getElementById('alert-list');
    const empty = list.querySelector('.empty-state');
    if (empty) empty.remove();
    const p    = spot.properties;
    const time = new Date(p.timestamp).toLocaleTimeString();
    const card = document.createElement('div');
    card.className = `alert-card ${p.severity}`;
    card.innerHTML = `
      <div class="alert-top">
        <span class="severity-badge ${p.severity}">${p.severity}</span>
        <span class="alert-time">${time}</span>
      </div>
      ${p.ai_summary && p.ai_summary !== '⏳ Generating AI summary…'
        ? `<div class="alert-summary" style="font-size:0.85rem;font-weight:600;color:#e6edf3;">${p.ai_summary}</div>`
        : `<div class="alert-summary" style="color:#484f58;font-style:italic;">Analyzing…</div>`}`;
    card.onclick = () => {
      const [lon, lat] = spot.geometry.coordinates;
      map.flyTo([lat, lon], 18, { duration: 1 });
      markers[p.spot_id]?.openPopup();
    };
    list.prepend(card);
    return card;
  }

  function popupHTML(p) {
    const icon    = p.severity === 'RED' ? '🔴' : '🟠';
    const summary = p.ai_summary && p.ai_summary !== '⏳ Generating AI summary…'
      ? p.ai_summary : 'Analyzing…';
    return `<div style="font-family:system-ui;min-width:180px;max-width:220px;">
      <div style="font-weight:700;font-size:1rem;margin-bottom:6px;">${icon} ${summary}</div>
      <div style="font-size:0.7rem;color:#999;">${new Date(p.timestamp).toLocaleTimeString()}</div>
    </div>`;
  }

  async function fetchHotspots() {
    try {
      const res  = await fetch(`${API}/api/map/hotspots`);
      const data = await res.json();
      for (const f of data.features) {
        const p = f.properties;
        // Update severity on map if Gemini resolved a PENDING spot
        if (knownSpots.has(p.spot_id) && p.severity !== 'PENDING'
            && markers[p.spot_id]?._mRadius !== undefined) {
          const prev = spotSummaries[p.spot_id + '_sev'];
          if (prev === 'PENDING' && p.severity !== 'PENDING') {
            // Update map circle color
            markers[p.spot_id].setStyle({
              color:       p.severity === 'RED' ? '#ef4444' : '#f97316',
              fillColor:   p.severity === 'RED' ? '#ef4444' : '#f97316',
              fillOpacity: p.severity === 'RED' ? 0.22 : 0.16,
            });
            spotSummaries[p.spot_id + '_sev'] = p.severity;
            // Update sidebar card severity badge
            const card = alertCards[p.spot_id];
            if (card) {
              const badge = card.querySelector('.severity-badge');
              if (badge) {
                badge.textContent  = p.severity;
                badge.className    = `severity-badge ${p.severity}`;
              }
              // Also update left border color
              card.className = `alert-card ${p.severity}`;
            }
          }
        }
        if (!knownSpots.has(p.spot_id)) {
          knownSpots.add(p.spot_id);
          const [lon, lat] = f.geometry.coordinates;
          const layer = makeHazardLayer(p.severity, lat, lon);
          layer.addTo(map).bindPopup(popupHTML(p), { maxWidth: 260 });
          markers[p.spot_id]      = layer;
          spotSummaries[p.spot_id] = p.ai_summary;
          alertCards[p.spot_id]          = addAlertCard(f);
          spotSummaries[p.spot_id + '_sev'] = p.severity;
          totalScanned++;
          if (p.severity === 'RED') layer.openPopup();
        } else if (p.ai_summary && p.ai_summary !== '⏳ Generating AI summary…'
                   && p.ai_summary !== spotSummaries[p.spot_id]) {
          // Summary was updated by background Gemini task — refresh UI
          spotSummaries[p.spot_id] = p.ai_summary;
          markers[p.spot_id]?.setPopupContent(popupHTML(p));
          const card = alertCards[p.spot_id];
          if (card) {
            const el = card.querySelector('.alert-summary');
            if (el) {
              el.textContent = p.ai_summary;
              el.style.color = '#e6edf3';
              el.style.fontStyle = 'normal';
            }
          }
        }
      }
      document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
    } catch(e) { console.warn('Backend unreachable:', e.message); }
  }

  async function resetMap() {
    if (!confirm('Clear all hazard data from the database?')) return;
    await fetch(`${API}/api/map/reset`, { method:'DELETE' });
    Object.values(markers).forEach(m => map.removeLayer(m));
    Object.keys(markers).forEach(k => delete markers[k]);
    Object.keys(alertCards).forEach(k => delete alertCards[k]);
    Object.keys(spotSummaries).forEach(k => delete spotSummaries[k]);
    knownSpots.clear();
    totalScanned = 0;
    document.getElementById('alert-list').innerHTML = `
      <div class="empty-state"><div class="empty-icon">🛡️</div>
      <div>No hazards detected yet.<br/>Start riding to populate the map.</div></div>`;
  }

  fetchHotspots();
  setInterval(fetchHotspots, 3000);

  // ── Routing ────────────────────────────────────────────────────────────
  let pickMode    = null;   // 'start' | 'end' | null
  let startCoord  = null;
  let endCoord    = null;
  let startPin    = null;
  let endPin      = null;
  let directLayer = null;
  let safeLayer   = null;

  // Stop route panel clicks from triggering map click handler
  L.DomEvent.disableClickPropagation(document.querySelector('.route-panel'));

  // Geocode an address string → [lon, lat]
  async function geocode(text) {
    const q   = encodeURIComponent(text + ', Davis, CA');
    const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`;
    const res = await fetch(url, { headers:{'User-Agent':'CycleSentinel/1.0'} });
    const arr = await res.json();
    if (!arr.length) throw new Error(`Could not find "${text}" — try a more specific name.`);
    return [parseFloat(arr[0].lon), parseFloat(arr[0].lat)];
  }

  // Reverse geocode lat/lon → short address string
  async function reverseGeocode(lat, lon) {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`;
    const res = await fetch(url, { headers:{'User-Agent':'CycleSentinel/1.0'} });
    const d   = await res.json();
    // Return road + city for brevity
    const r = d.address;
    return r ? [r.road || r.pedestrian || r.path, r.suburb || r.city].filter(Boolean).join(', ')
             : `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
  }

  function placePin(which, lat, lon, label) {
    if (which === 'start') {
      if (startPin) startPin.remove();
      startCoord = [lon, lat];
      startPin = L.circleMarker([lat,lon], {
        radius:9, color:'#22c55e', fillColor:'#22c55e', fillOpacity:1, weight:2
      }).addTo(map).bindTooltip('Start', { permanent:true, direction:'top' });
      document.getElementById('input-start').value = label;
      document.getElementById('input-start').classList.remove('picking');
      // Auto-advance to end picking
      if (!endCoord) setTimeout(() => startPicking('end'), 150);
    } else {
      if (endPin) endPin.remove();
      endCoord = [lon, lat];
      endPin = L.circleMarker([lat,lon], {
        radius:9, color:'#ef4444', fillColor:'#ef4444', fillOpacity:1, weight:2
      }).addTo(map).bindTooltip('End', { permanent:true, direction:'top' });
      document.getElementById('input-end').value = label;
      document.getElementById('input-end').classList.remove('picking');
    }
    document.getElementById(`pick-${which}`).classList.remove('active');
  }

  function startPicking(which) {
    pickMode = which;
    map.getContainer().style.cursor = 'crosshair';
    document.getElementById('pick-hint').style.display = 'block';
    document.getElementById(`pick-${which}`).classList.add('active');
    document.getElementById(`input-${which}`).classList.add('picking');
    document.getElementById(`input-${which}`).placeholder = 'Click map…';
  }

  map.on('click', async function(e) {
    if (!pickMode) return;
    const { lat, lng } = e.latlng;
    const which = pickMode;
    pickMode = null;
    map.getContainer().style.cursor = '';
    document.getElementById('pick-hint').style.display = 'none';
    const label = await reverseGeocode(lat, lng);
    placePin(which, lat, lng, label);
  });

  async function resolveInput(which) {
    const val = document.getElementById(`input-${which}`).value.trim();
    if (!val) throw new Error(`Please enter a ${which} location.`);
    const [lon, lat] = await geocode(val);
    const label = await reverseGeocode(lat, lon);
    placePin(which, lat, lon, label);
    map.flyTo([lat, lon], 16, { duration: 0.8 });
  }

  // Allow pressing Enter in inputs to geocode
  document.getElementById('input-start').addEventListener('keydown', async e => {
    if (e.key === 'Enter') {
      try {
        await resolveInput('start');
        // resolveInput calls placePin which auto-starts end picking
      } catch(err) { alert(err.message); }
    }
  });
  document.getElementById('input-end').addEventListener('keydown', async e => {
    if (e.key === 'Enter') { try { await resolveInput('end'); } catch(err) { alert(err.message); } }
  });

  async function findRoute() {
    // Geocode any unresolved text inputs first
    try {
      if (!startCoord) await resolveInput('start');
      if (!endCoord)   await resolveInput('end');
    } catch(err) { alert(err.message); return; }

    const btn = document.getElementById('btn-go');
    btn.disabled = true;
    btn.textContent = 'Routing…';

    if (directLayer) { directLayer.remove(); directLayer = null; }
    if (safeLayer)   { safeLayer.remove();   safeLayer   = null; }

    try {
      const res  = await fetch(`${API}/api/route`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ start: startCoord, end: endCoord }),
      });
      const data = await res.json();

      // Direct route — dashed gray
      directLayer = L.polyline(
        data.direct.coordinates.map(([lon,lat]) => [lat,lon]),
        { color:'#6b7280', weight:3, dashArray:'8 5', opacity:0.8 }
      ).addTo(map);

      // Safe route — solid green (drawn on top)
      safeLayer = L.polyline(
        data.safe.coordinates.map(([lon,lat]) => [lat,lon]),
        { color:'#22c55e', weight:5, opacity:0.9 }
      ).addTo(map);

      map.fitBounds(safeLayer.getBounds(), { padding:[50,50] });

      const result = document.getElementById('route-result');
      result.style.display = 'block';
      const extra    = data.safe_dist_m - data.direct_dist_m;
      const extraStr = extra > 0 ? `+${extra}m longer` : extra < 0 ? `${Math.abs(extra)}m shorter` : `same distance`;
      result.innerHTML = data.hazards_avoided > 0
        ? `<span class="good">✓ Avoided ${data.hazards_avoided} hazard(s)</span><br>
           <span class="warn">${extraStr} than direct</span>
           <span class="muted"> · ${(data.safe_dist_m/1000).toFixed(2)}km total</span>`
        : `<span class="good">✓ Route is clear — no hazards!</span><br>
           <span class="muted">${(data.direct_dist_m/1000).toFixed(2)}km</span>`;

    } catch(e) {
      const result = document.getElementById('route-result');
      result.style.display = 'block';
      result.innerHTML = `<span style="color:#ef4444">Routing failed: ${e.message}</span>`;
    }

    btn.textContent = 'Find Safe Route 🚲';
    btn.disabled = false;
  }
</script>

</body>
</html>
